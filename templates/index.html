<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodMagic 🌸 - Трекер настроения</title>
    <!-- Chart.js для графиков -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ========== ПЕРЕМЕННЫЕ ДЛЯ ТЕМ ========== */
        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: white;
            --text-color: #333;
            --text-secondary: #888;
            --btn-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --result-bg: #f8f9fa;
            --border-color: #ddd;
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --card-bg: #1e1e2e;
            --text-color: #e0e0e0;
            --text-secondary: #aaa;
            --btn-gradient: linear-gradient(135deg, #e94560 0%, #533483 100%);
            --result-bg: #2a2a3e;
            --border-color: #444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            padding: 20px;
            transition: all 0.3s ease;
            color: var(--text-color);
        }

        .container { max-width: 700px; margin: 0 auto; }

        /* Шапка с переключателем темы */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .theme-toggle {
            background: var(--card-bg);
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        h1 {
            color: #764ba2;
            text-align: center;
            margin-bottom: 10px;
        }
        [data-theme="dark"] h1 { color: #e94560; }

        h3 {
            color: #764ba2;
            margin-bottom: 15px;
        }
        [data-theme="dark"] h3 { color: #e94560; }

        .subtitle { text-align: center; color: var(--text-secondary); margin-bottom: 20px; }

        button {
            background: var(--btn-gradient);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.02); }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 16px;
            background: var(--card-bg);
            color: var(--text-color);
        }

        .mood-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }

        .mood-btn {
            flex: 1;
            text-align: center;
            padding: 15px;
            font-size: 24px;
            background: #f0f0f0;
            color: #333;
            cursor: pointer;
            border-radius: 15px;
            transition: all 0.2s;
        }
        [data-theme="dark"] .mood-btn { background: #2a2a3e; color: #e0e0e0; }

        .mood-btn:hover {
            background: #667eea;
            color: white;
            transform: scale(1.05);
        }

        .mood-btn.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .result {
            background: var(--result-bg);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        [data-theme="dark"] .success { background: #1a3a2a; color: #a0e0a0; border-color: #2a5a3a; }

        .delete-btn {
            background: #dc3545;
            padding: 5px 10px;
            font-size: 12px;
            margin-left: 10px;
        }

        .export-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        canvas { max-height: 300px; margin: 20px 0; }

        .footer { text-align: center; color: white; margin-top: 20px; font-size: 14px; }

        hr { margin: 20px 0; border-color: var(--border-color); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌸 MoodMagic 🌸</h1>
            <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        </div>
        <div class="subtitle">Твой трекер настроения с магией</div>

        <!-- Добавление настроения -->
        <div class="card">
            <h3>📝 Как у тебя дела?</h3>
            <div class="mood-buttons">
                <div class="mood-btn" data-score="1">😢</div>
                <div class="mood-btn" data-score="2">😕</div>
                <div class="mood-btn" data-score="3">😐</div>
                <div class="mood-btn" data-score="4">🙂</div>
                <div class="mood-btn" data-score="5">😊</div>
                <div class="mood-btn" data-score="6">😍</div>
            </div>
            <input type="hidden" id="score" value="5">
            <textarea id="note" placeholder="Расскажи, что случилось..." rows="2"></textarea>
            <input type="text" id="tags" placeholder="Теги через запятую">
            <button onclick="saveMood()">💾 Сохранить настроение</button>
            <div id="saveResult" class="result"></div>
        </div>

        <!-- График настроения -->
        <div class="card">
            <h3>📈 График настроения</h3>
            <canvas id="moodChart"></canvas>
            <button onclick="loadChart()">🔄 Обновить график</button>
        </div>

        <!-- Сегодняшнее настроение + статистика -->
        <div class="card">
            <h3>📅 Сегодня</h3>
            <button onclick="getTodayMood()">🔍 Показать</button>
            <div id="todayResult" class="result"></div>

            <hr>
            <h3>📊 Статистика за неделю</h3>
            <button onclick="getWeekMood()">📈 Показать</button>
            <div id="weekResult" class="result"></div>
        </div>

        <!-- История с удалением -->
        <div class="card">
            <h3>📜 История настроений</h3>
            <div class="export-buttons">
                <button onclick="getAllMoods()">📋 Показать всё</button>
                <button onclick="exportToCSV()" style="background: #28a745;">📁 Экспорт в CSV</button>
            </div>
            <div id="allResult" class="result"></div>
        </div>

        <!-- Магические правила -->
        <div class="card">
            <h3>🔮 Магические уведомления</h3>
            <select id="ruleScore">
                <option value="3">≤ 3 (грустно)</option>
                <option value="4">≤ 4 (немного грустно)</option>
                <option value="5">≤ 5 (средне)</option>
            </select>
            <input type="text" id="ruleMessage" placeholder="Утешительное сообщение" value="💜 Ты справишься!">
            <button onclick="addRule()">✨ Добавить правило</button>
            <button onclick="getRules()">📋 Посмотреть правила</button>
            <div id="ruleResult" class="result"></div>
        </div>
    </div>
    <div class="footer">
        🌸 Твоё настроение — это важно. Заботься о себе. 🌸
    </div>

    <script>
        let moodChart = null;

        // ========== ТЁМНАЯ ТЕМА ==========
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            document.querySelector('.theme-toggle').textContent = newTheme === 'dark' ? '☀️' : '🌙';
        }

        // Загрузка сохранённой темы
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.querySelector('.theme-toggle').textContent = savedTheme === 'dark' ? '☀️' : '🌙';
        }

        // Выбор настроения
        const moodBtns = document.querySelectorAll('.mood-btn');
        moodBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                moodBtns.forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
                document.getElementById('score').value = this.getAttribute('data-score');
            });
        });
        document.querySelector('.mood-btn[data-score="5"]').classList.add('selected');

        // ========== СОХРАНЕНИЕ НАСТРОЕНИЯ ==========
        async function saveMood() {
            const score = document.getElementById('score').value;
            const note = document.getElementById('note').value;
            const tagsInput = document.getElementById('tags').value;
            const tags = tagsInput ? tagsInput.split(',').map(t => t.trim()) : [];

            const resultDiv = document.getElementById('saveResult');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '⏳ Отправляю...';
            resultDiv.className = 'result';

            try {
                const response = await fetch('/api/mood', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ score: parseInt(score), note, tags })
                });
                const data = await response.json();

                if (response.ok) {
                    resultDiv.innerHTML = `✨ Сохранено! Оценка: ${data.score}/10<br>${data.magic_message}`;
                    resultDiv.className = 'result success';
                    document.getElementById('tags').value = '';
                    loadChart();
                } else {
                    resultDiv.innerHTML = '❌ ' + (data.error || 'Ошибка');
                }
            } catch (error) {
                resultDiv.innerHTML = '❌ Ошибка: ' + error.message;
            }
        }

        // ========== ГРАФИК ==========
        async function loadChart() {
            const response = await fetch('/api/mood/all');
            const data = await response.json();

            if (data.entries && data.entries.length > 0) {
                const reversed = [...data.entries].reverse();
                const labels = reversed.map(e => e.date);
                const scores = reversed.map(e => e.score);

                const ctx = document.getElementById('moodChart').getContext('2d');

                if (moodChart) moodChart.destroy();

                moodChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Настроение (1-10)',
                            data: scores,
                            borderColor: '#764ba2',
                            backgroundColor: 'rgba(118, 75, 162, 0.1)',
                            tension: 0.3,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: { y: { min: 1, max: 10, stepSize: 1 } }
                    }
                });
            }
        }

        // ========== СЕГОДНЯ ==========
        async function getTodayMood() {
            const resultDiv = document.getElementById('todayResult');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '⏳ Загружаю...';

            const response = await fetch('/api/mood/today');
            const data = await response.json();

            if (data.found) {
                resultDiv.innerHTML = `📅 ${data.entry.date}<br>😊 Настроение: ${data.entry.score}/10<br>📝 ${data.entry.note || '—'}`;
            } else {
                resultDiv.innerHTML = `😴 ${data.message}`;
            }
            resultDiv.className = 'result success';
        }

        // ========== НЕДЕЛЯ ==========
        async function getWeekMood() {
            const resultDiv = document.getElementById('weekResult');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '⏳ Загружаю...';

            const response = await fetch('/api/mood/week');
            const data = await response.json();

            if (data.total_entries) {
                let html = `📊 Среднее: ${data.average_mood}/10<br>Всего: ${data.total_entries}<br><ul>`;
                for (let e of data.entries) {
                    html += `<li>${e.date}: ${e.score}/10 ${e.note ? '— ' + e.note : ''}</li>`;
                }
                html += '</ul>';
                resultDiv.innerHTML = html;
            } else {
                resultDiv.innerHTML = `📭 ${data.message}`;
            }
            resultDiv.className = 'result success';
        }

        // ========== ВСЯ ИСТОРИЯ С УДАЛЕНИЕМ ==========
        async function getAllMoods() {
            const resultDiv = document.getElementById('allResult');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '⏳ Загружаю...';

            const response = await fetch('/api/mood/all');
            const data = await response.json();

            if (data.entries && data.entries.length > 0) {
                let html = `<strong>Всего записей: ${data.total_entries}</strong><br><ul>`;
                for (let e of data.entries) {
                    html += `<li>${e.date}: ${e.score}/10 ${e.note ? '— ' + e.note : ''}
                        <button class="delete-btn" onclick="confirmDelete(${e.id})">🗑️</button>
                    </li>`;
                }
                html += '</ul>';
                resultDiv.innerHTML = html;
            } else {
                resultDiv.innerHTML = `📭 ${data.message}`;
            }
            resultDiv.className = 'result success';
        }

        // ========== ПОДТВЕРЖДЕНИЕ УДАЛЕНИЯ ==========
        async function confirmDelete(id) {
            if (confirm('❓ Точно удалить эту запись? Это действие нельзя отменить.')) {
                const response = await fetch(`/api/mood/${id}`, { method: 'DELETE' });
                const data = await response.json();
                alert(data.message);
                getAllMoods();
                loadChart();
            }
        }

        // ========== ЭКСПОРТ В CSV ==========
        async function exportToCSV() {
            const response = await fetch('/api/mood/all');
            const data = await response.json();

            if (data.entries && data.entries.length > 0) {
                let csv = "Дата,Оценка,Заметка,Теги\n";
                for (let e of data.entries) {
                    csv += `"${e.date}",${e.score},"${e.note || ''}","${e.tags || ''}"\n`;
                }

                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                link.href = url;
                link.setAttribute('download', 'mood_history.csv');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            } else {
                alert('Нет данных для экспорта');
            }
        }

        // ========== МАГИЧЕСКИЕ ПРАВИЛА ==========
        async function addRule() {
            const min_score = document.getElementById('ruleScore').value;
            const message = document.getElementById('ruleMessage').value;

            const resultDiv = document.getElementById('ruleResult');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '⏳ Добавляю...';

            const response = await fetch('/api/alert/rule', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ min_score: parseInt(min_score), message })
            });
            const data = await response.json();

            resultDiv.innerHTML = data.message;
            resultDiv.className = 'result success';
        }

        async function getRules() {
            const resultDiv = document.getElementById('ruleResult');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '⏳ Загружаю...';

            const response = await fetch('/api/alert/rules');
            const data = await response.json();

            if (data.rules && data.rules.length > 0) {
                let html = '<ul>';
                for (let r of data.rules) {
                    html += `<li>🔔 Настроение ≤ ${r.min_score} → "${r.message}"</li>`;
                }
                html += '</ul>';
                resultDiv.innerHTML = html;
            } else {
                resultDiv.innerHTML = `✨ ${data.message}`;
            }
            resultDiv.className = 'result success';
        }

        // Загружаем график при старте
        loadChart();
    </script>
</body>
</html>
