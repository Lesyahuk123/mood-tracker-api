<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodMagic — Дневник настроения</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="theme-palette">
    <div class="color-dot dot-pink" onclick="setPalette('pink')"></div>
    <div class="color-dot dot-mint" onclick="setPalette('mint')"></div>
    <div class="color-dot dot-lavender" onclick="setPalette('lavender')"></div>
    <div class="color-dot dot-dark" onclick="setPalette('dark')" style="background: linear-gradient(135deg, #1a1a2e, #2d2d44);"></div>
</div>
        <div class="user-panel" id="userPanel">
            <span id="userName">Гость</span>
            <button id="logoutBtn" style="display:none;" onclick="logout()">Выйти</button>
            <button id="loginBtn" onclick="showAuthModal()">Вход</button>
        </div>
    </div>

    <div id="authSection" class="card" style="display:none;">
        <h3 id="authTitle">Вход</h3>
        <input type="text" id="authUsername" placeholder="Логин">
        <div class="field-hint">💡 Только буквы, цифры, от 3 до 20 символов</div>
        <input type="password" id="authPassword" placeholder="Пароль">
        <div class="field-hint">💡 От 4 до 50 символов, без пробелов</div>
        <button onclick="auth()">Войти</button>
        <button onclick="toggleAuthMode()">Нет аккаунта? Зарегистрироваться</button>
        <div id="authResult"></div>
    </div>

    <div id="appContent" style="display:none;">
        <div class="card">
            <h3>📅 Выбери день</h3>
            <input type="date" id="selectedDate">
            <button onclick="loadMoodForDate()">📖 Показать запись за этот день</button>
            <div id="existingMoodInfo"></div>
        </div>

        <div class="card">
            <h3>🗓️ Календарь настроения</h3>
            <div id="calendarContainer" class="calendar-grid"></div>
        </div>

        <!-- ===== ГРАФИК НАСТРОЕНИЯ ===== -->
        <div class="card">
            <h3>📈 График настроения</h3>
            <canvas id="moodChart" width="400" height="200"></canvas>
            <button onclick="loadChart()">🔄 Обновить график</button>
        </div>

        <div class="card">
            <h3>😊 Как дела?</h3>
            <div class="mood-buttons">
                <div class="mood-btn" data-score="1">😢</div>
                <div class="mood-btn" data-score="2">😕</div>
                <div class="mood-btn" data-score="3">😐</div>
                <div class="mood-btn" data-score="4">🙂</div>
                <div class="mood-btn" data-score="5">😊</div>
                <div class="mood-btn" data-score="6">😍</div>
            </div>
            <input type="hidden" id="score" value="5">
            <textarea id="note" placeholder="Заметка... (необязательно)"></textarea>
            <input type="text" id="tags" placeholder="Теги: работа, отдых, спорт">
            <input type="file" id="photoUpload" accept="image/*">
            <div id="imagePreview"></div>
            <button onclick="saveMood()">💾 Сохранить настроение</button>
            <div id="saveResult" class="result"></div>
        </div>

        <div class="card">
            <h3>📊 Статистика и аналитика</h3>
            <button onclick="loadStats()">📈 Моя общая статистика</button>
            <button onclick="loadMonthlyComparison()">📉 Сравнение с прошлым месяцем</button>
            <button onclick="loadTagAnalysis()">🏷️ Анализ тегов</button>
            <div id="statsResult"></div>
        </div>

        <div class="card">
            <h3>🔮 Магические правила</h3>
            <select id="ruleScore">
                <option value="2">≤2 очень грустно</option>
                <option value="3">≤3 грустно</option>
                <option value="4">≤4 нормально</option>
            </select>
            <input id="ruleMsg" placeholder="Утешительное сообщение">
            <button onclick="addRule()">✨ Добавить правило</button>
            <button onclick="loadRules()">📜 Показать правила</button>
            <div id="rulesResult"></div>
        </div>
    </div>
</div>

<script>
    let currentUserId = null, currentUsername = null, authMode = 'login';
    let moodChart = null;

    function setPalette(theme) {
    // Сначала сбрасываем всё
    document.body.removeAttribute('data-theme');
    document.body.classList.remove('dark-theme');

    // Применяем цветовую палитру (розовая по умолчанию)
    if (theme === 'mint') {
        document.body.setAttribute('data-theme', 'mint');
        localStorage.setItem('moodTheme', 'mint');
    } else if (theme === 'lavender') {
        document.body.setAttribute('data-theme', 'lavender');
        localStorage.setItem('moodTheme', 'lavender');
    } else if (theme === 'dark') {
        document.body.classList.add('dark-theme');
        localStorage.setItem('moodTheme', 'dark');
    } else {
        // розовая (по умолчанию)
        document.body.removeAttribute('data-theme');
        localStorage.setItem('moodTheme', 'pink');
    }
}
    const savedTheme = localStorage.getItem('moodTheme');
    if (savedTheme && savedTheme !== 'pink') setPalette(savedTheme);

    function showAuthModal() {
        document.getElementById('authSection').style.display = 'block';
        document.getElementById('appContent').style.display = 'none';
    }
    function toggleAuthMode() {
        authMode = authMode === 'login' ? 'register' : 'login';
        document.getElementById('authTitle').innerText = authMode === 'login' ? 'Вход' : 'Регистрация';
    }

    async function auth() {
        const username = document.getElementById('authUsername').value.trim();
        const password = document.getElementById('authPassword').value;
        const resultDiv = document.getElementById('authResult');

        document.getElementById('authUsername').classList.remove('error');
        document.getElementById('authPassword').classList.remove('error');

        if (username.length < 3 || username.length > 20) {
            document.getElementById('authUsername').classList.add('error');
            resultDiv.innerHTML = '<div style="color:red">❌ Логин должен быть от 3 до 20 символов</div>';
            return;
        }
        const loginRegex = /^[a-zA-Z0-9_]+$/;
        if (!loginRegex.test(username)) {
            document.getElementById('authUsername').classList.add('error');
            resultDiv.innerHTML = '<div style="color:red">❌ Логин может содержать только буквы, цифры и подчёркивание</div>';
            return;
        }
        if (password.length < 4 || password.length > 50) {
            document.getElementById('authPassword').classList.add('error');
            resultDiv.innerHTML = '<div style="color:red">❌ Пароль должен быть от 4 до 50 символов</div>';
            return;
        }
        if (password.includes(' ')) {
            document.getElementById('authPassword').classList.add('error');
            resultDiv.innerHTML = '<div style="color:red">❌ Пароль не должен содержать пробелов</div>';
            return;
        }

        const url = authMode === 'login' ? '/api/login' : '/api/register';
        const res = await fetch(url, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password})
        });
        const data = await res.json();

        if (res.ok) {
            currentUserId = data.user_id;
            currentUsername = data.username;
            document.getElementById('userName').innerText = currentUsername;
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'inline-block';
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('appContent').style.display = 'block';
            loadCalendar();
            loadMoodForDate();
            loadChart();
            resultDiv.innerHTML = '';
        } else {
            resultDiv.innerHTML = `<div style="color:red">❌ ${data.error}</div>`;
        }
    }

    async function logout() {
        await fetch('/api/logout', {method: 'POST'});
        location.reload();
    }

    const today = new Date().toISOString().split('T')[0];
    document.getElementById('selectedDate').value = today;
    document.getElementById('selectedDate').max = today;

    function clearMoodForm() {
        document.getElementById('note').value = '';
        document.getElementById('tags').value = '';
        document.getElementById('photoUpload').value = '';
        document.getElementById('imagePreview').innerHTML = '';
        document.getElementById('existingMoodInfo').innerHTML = '';
        document.getElementById('saveResult').style.display = 'none';
        document.getElementById('saveResult').innerHTML = '';

        document.querySelectorAll('.mood-btn').forEach(btn => btn.classList.remove('selected'));
        document.querySelector('.mood-btn[data-score="5"]').classList.add('selected');
        document.getElementById('score').value = 5;
    }

    async function loadMoodForDate() {
        const date = document.getElementById('selectedDate').value;
        document.getElementById('existingMoodInfo').innerHTML = `<div>⏳ Загружаю...</div>`;

        const res = await fetch(`/api/mood/all?start_date=${date}&end_date=${date}`);
        const data = await res.json();
        const entry = data.entries?.[0];

        if (entry) {
            document.getElementById('existingMoodInfo').innerHTML = `<div class="stats-badge">✅ Уже есть запись за ${date}: ${entry.score}/6</div>`;
            document.getElementById('score').value = entry.score;
            document.getElementById('note').value = entry.note || '';
            document.getElementById('tags').value = entry.tags || '';
            document.querySelectorAll('.mood-btn').forEach(btn => btn.classList.remove('selected'));
            document.querySelector(`.mood-btn[data-score="${entry.score}"]`).classList.add('selected');

            if (entry.image_path) {
                document.getElementById('imagePreview').innerHTML = `<img src="/static/uploads/${entry.image_path}" class="image-preview">`;
            } else {
                document.getElementById('imagePreview').innerHTML = '';
            }
        } else {
            document.getElementById('existingMoodInfo').innerHTML = `<div>📭 Нет записи за ${date}. Создай новую!</div>`;
            clearMoodForm();
        }
    }

    async function saveMood() {
        const date = document.getElementById('selectedDate').value;
        const score = document.getElementById('score').value;
        const note = document.getElementById('note').value;
        const tags = document.getElementById('tags').value.split(',').map(t=>t.trim()).filter(t=>t);

        let imagePath = null;
        const photoFile = document.getElementById('photoUpload').files[0];
        if (photoFile) {
            const formData = new FormData();
            formData.append('photo', photoFile);
            formData.append('date', date);
            const photoRes = await fetch('/api/mood/upload-photo', { method: 'POST', body: formData });
            const photoData = await photoRes.json();
            if (photoRes.ok) imagePath = photoData.image_path;
        }

        const res = await fetch('/api/mood', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({date, score: parseInt(score), note, tags, image_path: imagePath})
        });
        const data = await res.json();
        document.getElementById('saveResult').style.display = 'block';
        document.getElementById('saveResult').innerHTML = `✨ ${data.message}<br>${data.magic_message || ''}`;
        document.getElementById('photoUpload').value = '';

        if (data.triggered_alerts && data.triggered_alerts.length > 0) {
            if ('Notification' in window && Notification.permission === 'granted') {
                const randomIndex = Math.floor(Math.random() * data.triggered_alerts.length);
                const randomAlert = data.triggered_alerts[randomIndex];
                new Notification('🔮 Магическое уведомление', { body: randomAlert });
            }
        }

        loadCalendar();
        loadMoodForDate();
        loadChart();
    }

    async function loadCalendar() {
        const res = await fetch('/api/mood/all');
        const data = await res.json();
        const moods = data.entries || [];
        const moodByDate = {};
        moods.forEach(m => { moodByDate[m.date] = m.score; });

        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth();
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month+1, 0).getDate();

        let html = '<div class="calendar-grid">';
        ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].forEach(d => html += `<div style="text-align:center; font-weight:bold;">${d}</div>`);
        for (let i=0; i<(firstDay+6)%7; i++) html += '<div></div>';
        for (let d=1; d<=daysInMonth; d++) {
            let dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            let score = moodByDate[dateStr];
            let colorClass = '';
            if(score >= 5) colorClass = 'high';
            else if(score >= 3) colorClass = 'medium';
            else if(score) colorClass = 'low';
            html += `<div class="cal-day ${colorClass}" onclick="selectDate('${dateStr}')">${d}</div>`;
        }
        html += '</div>';
        document.getElementById('calendarContainer').innerHTML = html;
    }

    function selectDate(date) {
        document.getElementById('selectedDate').value = date;
        loadMoodForDate();
    }

    // ===== ГРАФИК =====
    async function loadChart() {
        const res = await fetch('/api/mood/all');
        const data = await res.json();
        const moods = data.entries || [];

        if (moods.length === 0) {
            const ctx = document.getElementById('moodChart').getContext('2d');
            if (moodChart) moodChart.destroy();
            moodChart = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [{ label: 'Настроение (1-6)', data: [], borderColor: '#ff6f91', tension: 0.3 }] },
                options: { responsive: true, scales: { y: { min: 1, max: 6 } } }
            });
            return;
        }

        const sorted = [...moods].reverse();
        const labels = sorted.map(m => m.date);
        const scores = sorted.map(m => m.score);

        const ctx = document.getElementById('moodChart').getContext('2d');
        if (moodChart) moodChart.destroy();
        moodChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Настроение (1-6)',
                    data: scores,
                    borderColor: '#ff6f91',
                    backgroundColor: 'rgba(255, 111, 145, 0.1)',
                    tension: 0.3,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                scales: { y: { min: 1, max: 6, stepSize: 1 } }
            }
        });
    }

    async function loadStats() {
        const res = await fetch('/api/stats');
        const data = await res.json();
        if(data.average) {
            document.getElementById('statsResult').innerHTML = `<div class="result" style="display:block;">📊 Среднее: ${data.average}/6<br>📈 Макс: ${data.max}<br>📉 Мин: ${data.min}<br>📝 Всего записей: ${data.total}</div>`;
        } else {
            document.getElementById('statsResult').innerHTML = `<div>Нет данных</div>`;
        }
    }

    async function loadMonthlyComparison() {
        const res = await fetch('/api/monthly-comparison');
        const data = await res.json();
        if(data.percent_change) {
            let moodText = data.happier ? 'счастливее' : 'грустнее';
            document.getElementById('statsResult').innerHTML = `<div class="result" style="display:block;">📆 В этом месяце ${data.current_avg}/6 vs прошлый ${data.last_avg}/6<br>🎉 Ты на ${Math.abs(data.percent_change)}% ${moodText}!</div>`;
        } else {
            document.getElementById('statsResult').innerHTML = `<div>Недостаточно данных</div>`;
        }
    }

    async function loadTagAnalysis() {
        const res = await fetch('/api/tag-analysis');
        const data = await res.json();
        let html = '<div class="result" style="display:block;">🏷️ Анализ тегов:<ul>';
        (data.tags || []).forEach(t => {
            html += `<li>${t.tag}: средний балл ${t.avg_score}/6 (${t.count} записей)</li>`;
        });
        html += '</ul></div>';
        document.getElementById('statsResult').innerHTML = html;
    }

    async function addRule() {
        const min_score = document.getElementById('ruleScore').value;
        const message = document.getElementById('ruleMsg').value;
        await fetch('/api/alert/rule', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({min_score: parseInt(min_score), message})});
        loadRules();
        document.getElementById('ruleMsg').value = '';
    }

    async function loadRules() {
        const res = await fetch('/api/alert/rules');
        const data = await res.json();
        let html = '<ul>';
        (data.rules || []).forEach(r => html += `<li>🔔 Настроение ≤ ${r.min_score}/6 → "${r.message}"</li>`);
        html += '</ul>';
        document.getElementById('rulesResult').innerHTML = html;
    }

    if ('Notification' in window) {
        Notification.requestPermission();
    }

    (async () => {
        const me = await fetch('/api/me');
        if(me.ok) {
            const user = await me.json();
            currentUserId = user.user_id;
            currentUsername = user.username;
            document.getElementById('userName').innerText = currentUsername;
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'inline-block';
            document.getElementById('appContent').style.display = 'block';
            loadCalendar();
            loadMoodForDate();
            loadChart();
        } else {
            showAuthModal();
        }
    })();

    document.querySelectorAll('.mood-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('selected'));
            this.classList.add('selected');
            document.getElementById('score').value = this.getAttribute('data-score');
        });
    });
    document.querySelector('.mood-btn[data-score="5"]').classList.add('selected');
</script>
</body>
</html>
